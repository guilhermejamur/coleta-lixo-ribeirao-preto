<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 118" width="460" height="118">

  <!-- ── Ícone: lixeira com balão de fala ── -->
  <!-- Balão de fala (corpo) -->
  <rect x="4" y="4" width="96" height="84" rx="14" ry="14"
        fill="none" stroke="#6abf69" stroke-width="5"/>
  <!-- Cauda do balão (canto inferior esquerdo) -->
  <polyline points="18,88 4,114 42,88"
            fill="none" stroke="#6abf69" stroke-width="5"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Tampa da lixeira: alça -->
  <rect x="42" y="14" width="20" height="6" rx="3"
        fill="none" stroke="#6abf69" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Tampa: barra horizontal -->
  <rect x="26" y="20" width="52" height="8" rx="3"
        fill="none" stroke="#6abf69" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Corpo da lixeira -->
  <rect x="30" y="28" width="44" height="46" rx="5"
        fill="none" stroke="#6abf69" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Linhas internas verticais -->
  <line x1="41" y1="34" x2="41" y2="68"
        stroke="#6abf69" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="34" x2="52" y2="68"
        stroke="#6abf69" stroke-width="4" stroke-linecap="round"/>
  <line x1="63" y1="34" x2="63" y2="68"
        stroke="#6abf69" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Textos ── -->
  <!-- Linha 1: Estre.Atende.Coleta -->
  <text x="116" y="38" font-family="'Arial', sans-serif" font-size="26">
    <tspan fill="#555555" font-weight="400">Estre.</tspan><tspan fill="#6abf69" font-weight="800">Atende.</tspan><tspan fill="#555555" font-weight="400">Coleta</tspan>
  </text>

  <!-- Linha 2: Telefone -->
  <text x="116" y="76"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="34" font-weight="900" fill="#6abf69">(16) 99796-0860</text>

  <!-- Linha 3: Badge Ribeirão Preto -->
  <rect x="116" y="85" width="152" height="26" rx="13" fill="#999999"/>
  <text x="192" y="103"
        font-family="'Arial', sans-serif"
        font-size="13.5" font-weight="700" fill="#ffffff"
        text-anchor="middle">Ribeirão Preto</text>

</svg>
